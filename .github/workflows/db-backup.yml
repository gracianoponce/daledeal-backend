name: DB Backup

# Backup diario de Postgres a un artefacto de GitHub (retiene 30 días).
# Para restaurar: descargar el .sql.gz de Actions → gunzip → psql.
#
# Por qué GitHub Actions y no un cron en Railway:
#   - Railway no tiene cron jobs nativos en plan free
#   - GitHub Actions es gratis hasta 2000 min/mes para repos públicos
#   - Los artefactos son privados al repo (solo collaborators)
#   - Si querés rotación más larga, mover a R2/S3 con un step extra
#
# El secret DATABASE_URL_BACKUP tiene que ser la URL PÚBLICA de Postgres
# (la postgresql://...@zephyr.proxy.rlwy.net:33001/... que dimos de alta
# en Railway con "Public Network"). NO uses ${{ Postgres.DATABASE_URL }}
# porque esa es la URL privada interna, no accesible desde GitHub Actions.

on:
  schedule:
    # 03:00 UTC todos los días = 00:00 ARG (medianoche).
    # Pico de tráfico bajo, no afecta a usuarios.
    - cron: '0 3 * * *'
  workflow_dispatch:  # Permite triggear manualmente desde la UI de Actions

jobs:
  backup:
    name: Snapshot daily
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          # Configurar este secret en GitHub Settings → Secrets → Actions
          # Valor: postgresql://postgres:<pw>@zephyr.proxy.rlwy.net:<port>/railway
          DATABASE_URL: ${{ secrets.DATABASE_URL_BACKUP }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Falta el secret DATABASE_URL_BACKUP en Settings → Secrets"
            exit 1
          fi
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          OUT="daledeal-backup-${STAMP}.sql.gz"
          echo "Generando $OUT..."
          pg_dump --no-owner --no-acl --clean --if-exists "$DATABASE_URL" | gzip > "$OUT"
          ls -lh "$OUT"
          echo "BACKUP_FILE=$OUT" >> $GITHUB_ENV

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
          if-no-files-found: error
