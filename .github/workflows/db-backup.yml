name: DB Backup

# Backup diario de la DB vía el endpoint /backup/dump del backend.
#
# CAMBIO vs versión anterior: antes usábamos pg_dump contra la URL pública
# de Postgres (TCP proxy). Esa URL se borró por seguridad (exponía la DB a
# internet). Ahora pegamos a un endpoint con token dedicado que devuelve un
# dump JSON — la DB sigue privada, solo el backend (con acceso interno) la lee.
#
# Requiere el secret BACKUP_TOKEN en GitHub (Settings → Secrets → Actions)
# con el MISMO valor que la env var BACKUP_TOKEN del backend en Railway.
#
# Para restaurar: descargar el .json.gz del artifact → gunzip → script de
# import que recorre tables{} y hace INSERT (o cargar a mano lo que haga falta).

on:
  schedule:
    # 03:00 UTC = 00:00 ART (medianoche Argentina). Tráfico bajo.
    - cron: '0 3 * * *'
  workflow_dispatch:  # permite correrlo manual desde la UI de Actions

jobs:
  backup:
    name: Snapshot diario (JSON dump)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Descargar dump desde el backend
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
          API_URL: https://daledeal-backend-production.up.railway.app
        run: |
          if [ -z "$BACKUP_TOKEN" ]; then
            echo "::error::Falta el secret BACKUP_TOKEN en Settings → Secrets → Actions"
            exit 1
          fi
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          OUT="daledeal-backup-${STAMP}.json"
          echo "Descargando dump a $OUT..."
          HTTP_CODE=$(curl -s -w "%{http_code}" -o "$OUT" \
            -H "X-Backup-Token: $BACKUP_TOKEN" \
            "$API_URL/backup/dump")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::El endpoint devolvió HTTP $HTTP_CODE"
            head -c 500 "$OUT" || true
            exit 1
          fi
          BYTES=$(wc -c < "$OUT")
          echo "Backup OK: $BYTES bytes"
          if [ "$BYTES" -lt 50 ]; then
            echo "::error::El backup parece vacío ($BYTES bytes)"
            exit 1
          fi
          # Validar JSON antes de guardar
          python3 -c "import json,sys; d=json.load(open('$OUT')); print('Tablas:', d['meta']['table_count'], '| Filas:', d['meta']['total_rows'])"
          gzip "$OUT"
          echo "BACKUP_FILE=${OUT}.gz" >> $GITHUB_ENV

      - name: Subir backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
          if-no-files-found: error
